<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeLan</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
          <a class="navbar-brand" href="#">FreeLan</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="#">홈</a></li>
              <li class="nav-item">
                <a class="nav-link" href="#">카테고리</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">고객센터</a>
              </li>
              <li class="nav-item"><a class="nav-link" href="#">로그인</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section
        class="hero-section text-center text-white d-flex align-items-center"
        style="height: 100vh; background-color: var(--main-color)"
      >
        <div class="container">
          <h1 class="display-4 fw-bold">당신의 재능, 여기서 시작됩니다</h1>
          <p class="lead mt-3">프리랜서를 위한 최고의 매칭 플랫폼, FreeLan</p>
          <a href="#" class="btn btn-light btn-lg mt-4">지금 시작하기</a>
        </div>
      </section>
      <section class="py-5">
  <div class="container">
    <h2 class="text-center fw-bold mb-4">서비스 카테고리</h2>
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">
      <!-- 카드 1~8 -->
      <div class="col">
        <div class="card h-100 text-center">
          <div class="card-body">
            <img src="assets/icons/design.svg" alt="디자인" width="48" class="mb-3">
            <h5 class="card-title">디자인</h5>
          </div>
        </div>
      </div>
      <!-- 반복 카드 생략 -->
      <!-- 전체보기 카드 -->
      <div class="col">
        <div class="card h-100 text-center border-dashed">
          <div class="card-body d-flex align-items-center justify-content-center">
            <a href="#" class="btn btn-outline-primary w-100">전체보기</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

    </main>
    <footer></footer>

    <!-- Bootstrap JS (defer 처리) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </body>
</html>
